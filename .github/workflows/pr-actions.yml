name: PR Actions

on:
  pull_request:

jobs:
  check-test-and-failed-files:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fail if both test and failed files exist
        run: |
          sleep 120s
          has_test=$(find . -type f -name 'test' -not -path './.git/*' | head -n 1)
          has_failed=$(find . -type f -name 'failed' -not -path './.git/*' | head -n 1)

          if [ -n "$has_test" ] && [ -n "$has_failed" ]; then
            echo "Error: Both test and failed files exist, which is not allowed. test: $has_test, failed: $has_failed"
            exit 1
          fi

          echo "Condition not met. Workflow passes."
